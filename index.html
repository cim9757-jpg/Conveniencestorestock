<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 - 재고모아 편의점 재고 확인</title>
    <meta name="description" content="주변 편의점의 실시간 재고를 확인하세요. 원하는 상품이 어느 매장에 있는지 한눈에!">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="hero-title">주변 편의점의 실시간 재고를 한눈에</h1>
            <p class="hero-subtitle">원하는 인기 상품이나 한정판 굿즈가 주변 매장에 있는지 지금 바로 확인해 보세요. 헛걸음 없는 스마트한 쇼핑이 시작됩니다.</p>

            <form class="search-form" onsubmit="doSearch(event)">
                <div class="search-box-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="상품명 또는 카테고리를 입력하세요 (예: 불닭, 삼각김밥, 펩시)" class="search-input" required autocomplete="off">
                    <button type="submit" class="search-btn">검색</button>
                </div>
            </form>

            <div class="category-tags" id="category-tags"></div>
        </section>

        <!-- Popular Products -->
        <section class="popular-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-fire" style="color:#f59e0b;"></i> 실시간 인기 상품</h2>
                <a href="search.html" style="font-size:0.9rem;color:var(--accent);font-weight:600;">전체 보기 <i class="fas fa-chevron-right"></i></a>
            </div>
            <div class="product-grid" id="product-grid"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 재고모아 (Convenience Stock Map Finder). All rights reserved.</p>
        <p style="margin-top:5px;font-size:0.75rem;">SW 프로그래밍 실습 과제물 - 고려대학교 서울캠퍼스 주변 가상 데이터 적용</p>
    </footer>

    <script src="static/js/data.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        renderNavbar('home');

        // 카테고리 태그 렌더링
        const tagsContainer = document.getElementById('category-tags');
        tagsContainer.innerHTML = '<a href="search.html" class="category-tag">전체</a>';
        getCategories().forEach(cat => {
            tagsContainer.innerHTML += `<a href="search.html?category=${encodeURIComponent(cat)}" class="category-tag">${cat}</a>`;
        });

        // 인기 상품 8개 렌더링
        const grid = document.getElementById('product-grid');
        PRODUCTS.slice(0, 8).forEach(p => {
            grid.innerHTML += createProductCardHTML(p);
        });

        // 검색 폼
        function doSearch(e) {
            e.preventDefault();
            const q = document.getElementById('search-input').value.trim();
            if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
        }
    </script>
</body>
</html>
