{% extends "base.html" %}

{% block title %}로그인 - 재고모아{% endblock %}

{% block content %}
<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">로그인</h1>
            <p class="auth-subtitle">편의점 실시간 재고 조회를 위해 로그인하세요.</p>
        </div>

        <form action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" method="POST">
            <!-- Username Input -->
            <div class="form-group">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus autocomplete="off">
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary auth-submit-btn">로그인</button>
        </form>

        <div class="auth-footer">
            <span>아직 계정이 없으신가요?</span>
            <a href="{{ url_for('register') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">회원가입</a>
        </div>
    </div>
</main>
{% endblock %}
