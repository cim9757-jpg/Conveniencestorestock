{% extends "base.html" %}

{% block title %}회원가입 - 재고모아{% endblock %}

{% block content %}
<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">회원가입</h1>
            <p class="auth-subtitle">간편하게 회원가입을 하고 편의점 재고 정보를 확인해 보세요.</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST">
            <!-- Username Input -->
            <div class="form-group">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="아이디를 입력하세요" required autocomplete="off">
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>

            <!-- Password Confirm Input -->
            <div class="form-group">
                <label for="password_confirm" class="form-label">비밀번호 확인</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="비밀번호를 한번 더 입력하세요" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary auth-submit-btn">회원가입</button>
        </form>

        <div class="auth-footer">
            <span>이미 계정이 있으신가요?</span>
            <a href="{{ url_for('login') }}">로그인</a>
        </div>
    </div>
</main>
{% endblock %}
